<html><head><meta charset="utf-8"><title>HTML-CSS-JS</title>
<link rel="shortcut icon" href="data set/i.ico">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
	* {transition: .3s}
	body,iframe {height:100vh; border:0; padding:0; margin:0}

  #menu {width:247px; float:left; border-right:3px solid #000}
	#menu:hover ~ .burger {opacity: 1}
	#book {width: calc(100% - 250px)}


  .burger {width:10px; height:40px; position:absolute; z-index:10; left:250px; top:0; line-height:37px; color:#999; background:#eee; opacity:0; cursor:pointer}
	.burger::before {content:'<<'; letter-spacing:-6px; display:block; font-size:15px; font-family:monospace; width:100%; height:100%; cursor:pointer}
	.burger:hover{background:#ccc; color:#333; opacity:1}
  .lg {top: 45px;}
  .lg::before {content: '>>'}

  .x2 #menu {width: 400px}
  .x2 #book {width: calc(100% - 403px)}
  .x2 .lg::before {content: '<<'}
	.x2 .lg {left:400px; background:#aaa; color:#000; opacity:1}
  .x2 .burger {left: 400px}

	.menu-off #menu {margin-left: -250px}
	.menu-off #book {width: 100%}
	.menu-off .burger {left:0; background:#aaa; color:#000; opacity:1}
	.menu-off .burger::before {content: '>>'}

	.x2.menu-off .lg {left: 0}
  .x2.menu-off #menu {margin-left: -403px}
  .x2.menu-off #book {width: 100%}
</style>
<style>
	/* Оформление для темной темы браузера */
	:root {color-scheme: light dark;}
	@media (prefers-color-scheme: dark) {
		.burger {background: #357;}
	}
</style>
</head>
<body id="body">
	<iframe id="menu" src="data set/menu.html"></iframe>
	<iframe id="book" src="data set/-blank-/blank.html" name="main"></iframe>

  <div class="burger" title="показать/скрыть меню" onclick='body.classList.toggle("menu-off");'></div>

  <div class="burger lg" title="увеличить/вернуть размер меню" onclick='body.classList.toggle("x2");'></div>
</body></html>
