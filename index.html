<html><head><meta charset="utf-8"><title>HTML-CSS-JS</title>
<link rel="shortcut icon" href="data set/i.ico">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
	body,iframe {height:100vh; border:0; padding:0; margin:0; outline:none}
	body {font-size: 20px}
	iframe:focus {outline:none}

	#menu {width:12.5em; float:left; border-right:0.1em solid #000; box-sizing:border-box; transition:.3s}
	#menu:hover ~ .burger {opacity: 1}
	#book {width: calc(100% - 12.5em); transition:.3s}


	.burger {width:0.5em; height:2em; position:absolute; z-index:10; left:12.5em; top:0; line-height:1.85em; color:#999; background:#eee; opacity:0; cursor:pointer; transition:.3s;}
	.burger::before {content:'<<'; letter-spacing:-0.42em; display:block; font-size:0.7em; font-family:monospace; width:100%; height:100%; cursor:pointer}
	.burger:hover{background:#ccc; color:#333; opacity:1}
	.lg {top: 2.25em}
	.lg::before {content: '>>'}

	.x2 #menu {width: 20em}
	.x2 #book {width: calc(100% - 20em)}
	.x2 .lg::before {content: '<<'}
	.x2 .lg {left:20em; background:#aaa; color:#000; opacity:1}
	.x2 .burger {left: 20em}

	.menu-off #menu {margin-left: -12.5em}
	.menu-off #book {width: 100%}
	.menu-off .burger {left:0; background:#aaa; color:#000; opacity:1}
	.menu-off .burger::before {content: '>>'}

	.x2.menu-off .lg {left: 0}
	.x2.menu-off #menu {margin-left: -20em}
	.x2.menu-off #book {width: 100%}
</style>
<style>
	/* Оформление для темной темы браузера */
	:root {color-scheme: light dark}
	@media (prefers-color-scheme: dark) {
		#menu {border-color: #444}
		.burger {background: #357}
	}
</style>
</head>
<body id="body">
	<iframe id="menu" src="data set/menu.html"></iframe>
	<iframe id="book" src="data set/-blank-/blank.html" name="main"></iframe>
	<div class="burger" title="показать/скрыть меню" onclick='body.classList.toggle("menu-off");'></div>
	<div class="burger lg" title="увеличить/вернуть размер меню" onclick='body.classList.toggle("x2");'></div>
</body></html>
