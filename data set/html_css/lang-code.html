<!DOCTYPE html><html lang="ru"><head><title>Коды языков</title>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="../css/mane.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

	h2{margin:0; line-height:30px;}
	.ul_menu{
		display:flex;
		height:40px;
		width:100%;
		margin:5px 0;
		padding:0;
		justify-content:center;
		color:#333;
	}
	.elA{
		padding:2px 7px 3px;
		margin-right:5px;
		height:25px;
		line-height:25px;
		font-size:20px;
		background:#dadada;
		border-radius:5px;
		transition:.2s;
	}
	.elA:last-child{margin:0}
	.elA:hover{
		background:#bbb;
		transition:.2s;
	}
	.elA.active{
		background:#777 !important;
		color:#fafafa;
		transition:.2s;
	}
	.lang{
		width:100%;
		height:calc(100vh - 140px);
	}
</style>
</head>
<body>

<div class="item" style="min-width:822px">
<h2 class="sin">Коды языков</h2>
	<div class="ul_menu">
		<a class="elA active" target="lang" href="lang-code-min.html" id="l1">min версия</a>
		<a class="elA" target="lang" href="lang-code-iso639.html" id="l2">ISO 639</a>
		<a class="elA" target="lang" href="lang-code-all.html" id="l3">Все теги</a>
		<a class="elA" target="lang" href="lang-code-regions.html" id="l4">Коды регионов</a>
		<a class="elA" target="lang" href="lang-code-add.html" id="l5">Добавочные + variant</a>
		<a class="elA" target="lang" href="lang-code-old.html" id="l6">Устаревшие</a>
		<a class="elA" target="lang" href="lang-code-script.html" id="l7">Script</a>
	</div>
	<iframe src="lang-code-min.html" frameborder="0" class="lang" name="lang"></iframe>
</div>

<script>
	const ul = document.querySelector('.ul_menu').children;

	for (let el of ul){
		el.addEventListener('click', addActive);
	}

	function addActive(e) {
		for(let el of ul){
			el.classList.remove('active');
			if(el==e.target){
				el.classList.add('active');
			}
		}
	}


	const iframe = document.querySelector('iframe');
	let ls = localStorage.getItem('iframe_lang_code');
	if(ls){
		if(ls=='1'){document.querySelector(`#l${ls}`).click();}
		if(ls=='2'){document.querySelector(`#l${ls}`).click();}
		if(ls=='3'){document.querySelector(`#l${ls}`).click();}
		if(ls=='4'){document.querySelector(`#l${ls}`).click();}
		if(ls=='5'){document.querySelector(`#l${ls}`).click();}
		if(ls=='6'){document.querySelector(`#l${ls}`).click();}
		if(ls=='7'){document.querySelector(`#l${ls}`).click();}
		localStorage.removeItem("iframe_lang_code");
	}
</script>

</body></html>
