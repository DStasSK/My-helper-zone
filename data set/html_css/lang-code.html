<!DOCTYPE html><html lang="ru"><head><title>Коды языков</title>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="../css/main.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

	h1 {margin:10px 0 0; line-height:30px}
	.item {margin-bottom:0}
	.ul_menu {
		display:flex; justify-content:center;
		width:100%; margin:5px 0 10px; padding:0; color:#333;
	}
	.elA {
		display:flex; align-items:center;
		padding:2px 7px 3px; margin-right:5px; border-radius:5px; background:#dadada;
		line-height:25px; font-size:18px; text-align:center; transition:.2s;
	}
	.elA:last-child {margin: 0}
	.elA:hover {background:#bbb; transition:.2s}
	.elA.active {background:#777; color:#fafafa}
	.lang {width:100%; height:calc(100vh - 140px)}
</style>
</head>
<body>

<h1 class="sin">Коды языков</h1>
<div class="item">
	<div class="ul_menu">
		<a class="elA active" target="lang" href="lang-code-min.html" id="l1">min версия</a>
		<a class="elA" target="lang" href="lang-code-iso639.html" id="l2">ISO 639</a>
		<a class="elA" target="lang" href="lang-code-all.html" id="l3">Все теги</a>
		<a class="elA" target="lang" href="lang-code-regions.html" id="l4">Коды регионов</a>
		<a class="elA" target="lang" href="lang-code-add.html" id="l5">Добавочные + variant</a>
		<a class="elA" target="lang" href="lang-code-old.html" id="l6">Устаревшие</a>
		<a class="elA" target="lang" href="lang-code-script.html" id="l7">Script</a>
	</div>
	<iframe src="lang-code-min.html" frameborder="0" class="lang" name="lang"></iframe>
</div>

<script>
	const ul = document.querySelector('.ul_menu').children;
	for (let el of ul) {el.addEventListener('click', addActive)}

	function addActive(e) {
		for (let el of ul) {
			el.classList.remove('active');
			el==e.target ? el.classList.add('active') :'';
		}
	}
</script>

</body></html>
